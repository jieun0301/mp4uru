<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Private Reel</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: black; font-family: 'Roboto', sans-serif; -webkit-font-smoothing: antialiased; }
        .video-container { 
            height: 100dvh; scroll-snap-type: y mandatory; overflow-y: scroll; 
            scrollbar-width: none; -ms-overflow-style: none; -webkit-overflow-scrolling: touch;
        }
        .video-container::-webkit-scrollbar { display: none; }
        .video-section { 
            height: 100dvh; scroll-snap-align: start; scroll-snap-stop: always; 
            position: relative; display: flex; align-items: center; justify-content: center; background: black; 
        }
        video { max-height: 100%; max-width: 100%; object-fit: contain; background: black; pointer-events: none; }
        .material-symbols-rounded { font-variation-settings: 'FILL' 1, 'wght' 400; color: white; font-size: 28px; }
        .side-btn {
            width: 54px; height: 54px; background: rgba(255, 255, 255, 0.1); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <div class="video-container" id="feed">
        <div id="loader" class="text-white flex items-center justify-center h-full text-xs opacity-40 uppercase tracking-widest">Loading...</div>
    </div>

    <div id="controls" class="fixed bottom-24 right-6 flex flex-col gap-5 z-50">
        <button onclick="checkAdmin()" class="side-btn opacity-20"><span class="material-symbols-rounded">encrypted</span></button>
        <button onclick="vDownloadCurrent()" class="side-btn"><span class="material-symbols-rounded">download</span></button>
        <button onclick="vToggleMute(this)" class="mute-btn side-btn"><span class="material-symbols-rounded">volume_off</span></button>
    </div>

    <div id="uploadModal" class="fixed inset-0 bg-black/95 hidden flex-col items-center justify-center text-white p-5 z-[100] backdrop-blur-md">
        <div class="bg-[#1C1B1F] p-8 rounded-[32px] w-full max-w-sm border border-white/5 shadow-2xl">
            <h2 class="mb-6 text-xl font-medium text-center text-[#D0BCFF]">New Content</h2>
            <input type="file" id="videoInput" accept="video/*" class="mb-6 block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-6 file:rounded-full file:border-0 file:bg-[#D0BCFF] file:text-[#381E72]">
            <div class="flex gap-3">
                <button onclick="uploadVideo()" id="uploadBtn" class="flex-1 bg-[#D0BCFF] text-[#381E72] py-4 rounded-full font-bold">Upload</button>
                <button onclick="closeModal()" class="flex-1 bg-[#49454F] py-4 rounded-full font-bold text-white">Close</button>
            </div>
            <div id="status" class="mt-4 text-xs text-center text-[#D0BCFF]"></div>
        </div>
    </div>

    <script>
        // [필독] 본인의 Supabase 정보로 꼭 교체하세요!
        const S_URL = 'https://emizkuoleiqbkobvmbvu.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtaXprdW9sZWlxYmtvYnZtYnZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMzI3OTgsImV4cCI6MjA5MDYwODc5OH0.FKqJ-i72dxKV8LB1dy6WZDJgJmScMYMU1awF5yFhCNU';
        
        let s_client;
        try {
            s_client = supabase.createClient(S_URL, S_KEY);
        } catch (e) {
            console.error("Supabase 초기화 실패:", e);
        }

        let isAdmin = false;
        let isGlobalMuted = true;
        let currentVideoData = { url: '', name: '' };
        let isScrolling = false;
        let playTimeout = null;

        async function loadVideos() {
            const feed = document.getElementById('feed');
            try {
                const { data, error } = await s_client.storage.from('videos').list();
                if (error) throw error;

                const shuffled = data.filter(f => f.name !== '.emptyFolderPlaceholder').sort(() => Math.random() - 0.5);
                
                if (shuffled.length === 0) {
                    feed.innerHTML = '<div class="text-white opacity-40 text-center w-full mt-20">No videos found.</div>';
                    return;
                }

                feed.innerHTML = '';
                shuffled.forEach(file => {
                    const { data: { publicUrl } } = s_client.storage.from('videos').getPublicUrl(file.name);
                    addVideoToFeed(publicUrl, file.name);
                });
                setupObserver();
            } catch (err) {
                console.error("데이터 로드 중 오류:", err);
                feed.innerHTML = `<div class="text-red-400 p-10 text-center">${err.message}</div>`;
            }
        }

        function addVideoToFeed(url, fileName) {
            const feed = document.getElementById('feed');
            const section = document.createElement('div');
            section.className = 'video-section';
            section.onclick = function() { vHandleTouch(this.querySelector('video')); };
            section.innerHTML = `
                <video data-src="${url}" data-name="${fileName}" playsinline muted preload="metadata" onended="autoNext(this)"></video>
                ${isAdmin ? `<button onclick="event.stopPropagation(); deleteVideo('${fileName}')" class="absolute top-10 right-6 bg-[#F2B8B5] text-[#601410] px-5 py-2 rounded-full text-xs font-bold z-50 shadow-xl">Delete</button>` : ''}
            `;
            feed.appendChild(section);
        }

        function setupObserver() {
            const options = { threshold: 0.7 }; // 70% 이상 보일 때
            const obs = new IntersectionObserver((entries) => {
                if (isScrolling) return;

                entries.forEach(entry => {
                    const v = entry.target.querySelector('video');
                    if (!v) return;

                    if (entry.isIntersecting) {
                        if (playTimeout) clearTimeout(playTimeout);
                        playTimeout = setTimeout(() => {
                            // 다른 모든 영상 정지 (안전 장치)
                            document.querySelectorAll('video').forEach(vid => {
                                if (vid !== v) vid.pause();
                            });
                            playVideo(v);
                        }, 150); 
                    } else {
                        v.pause();
                    }
                });
            }, options);

            document.querySelectorAll('.video-section').forEach(s => obs.observe(s));
        }

        function playVideo(v) {
            if (!v.getAttribute('data-src')) return;
            if (!v.src) v.src = v.getAttribute('data-src');
            
            currentVideoData.url = v.getAttribute('data-src');
            currentVideoData.name = v.getAttribute('data-name');
            
            v.muted = isGlobalMuted;
            
            // 재생 시도 (Promise 에러 핸들링 추가)
            const playPromise = v.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("자동 재생 차단됨 (사용자 상호작용 필요):", error);
                    // 브라우저가 막으면 무음으로라도 시도
                    v.muted = true;
                    v.play().catch(e => console.error("최종 재생 실패:", e));
                });
            }
        }

        function autoNext(v) {
            if (isScrolling) return;
            const current = v.closest('.video-section');
            const next = current.nextElementSibling;
            const container = document.getElementById('feed');
            
            isScrolling = true;
            if (next) {
                next.scrollIntoView({ behavior: 'smooth' });
            } else {
                container.scrollTo({ top: 0, behavior: 'smooth' });
            }

            setTimeout(() => {
                isScrolling = false;
                // 이동 후 중앙에 있는 영상 강제 재생
                const centerV = document.elementFromPoint(window.innerWidth/2, window.innerHeight/2)?.closest('.video-section')?.querySelector('video');
                if (centerV) playVideo(centerV);
            }, 800);
        }

        function vHandleTouch(v) { 
            if (isGlobalMuted) unlockAudio();
            if (v.paused) {
                v.play().catch(() => { v.muted = true; v.play(); });
            } else {
                v.pause();
            }
        }

        function unlockAudio() {
            isGlobalMuted = false;
            updateMuteStateAll();
        }

        function vToggleMute(btn) {
            isGlobalMuted = !isGlobalMuted;
            updateMuteStateAll();
        }

        function updateMuteStateAll() {
            document.querySelectorAll('video').forEach(v => v.muted = isGlobalMuted);
            const icon = document.querySelector('.mute-btn span');
            if (icon) icon.innerText = isGlobalMuted ? 'volume_off' : 'volume_up';
        }

        // --- 기타 기능 (기존과 동일) ---
        async function vDownloadCurrent() {
            if (!currentVideoData.url) return;
            try {
                const r = await fetch(currentVideoData.url);
                const b = await r.blob();
                const d = window.URL.createObjectURL(b);
                const a = document.createElement('a');
                a.href = d; a.download = currentVideoData.name; a.click();
            } catch (e) { alert("다운로드 실패"); }
        }

        async function uploadVideo() {
            const i = document.getElementById('videoInput'); if (!i.files[0]) return;
            const b = document.getElementById('uploadBtn'); const s = document.getElementById('status');
            b.disabled = true; s.innerText = "Uploading...";
            const ext = i.files[0].name.split('.').pop();
            const { error } = await s_client.storage.from('videos').upload(`v_${Date.now()}.${ext}`, i.files[0]);
            if (error) { alert(error.message); b.disabled = false; } else location.reload();
        }

        async function deleteVideo(n) { if (confirm("Delete?")) { await s_client.storage.from('videos').remove([n]); location.reload(); } }
        function checkAdmin() { if (prompt("Password?") === "0000") { isAdmin = true; document.getElementById('uploadModal').style.display = 'flex'; loadVideos(); } }
        function closeModal() { document.getElementById('uploadModal').style.display = 'none'; }
        
        loadVideos();
    </script>
</body>
</html>
